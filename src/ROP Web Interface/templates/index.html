<!DOCTYPE html>

<html>
<head>
<title>ROP Detection System</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #dbeafe, #f0f9ff);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.container {
    background: white;
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    text-align: center;
    width: 400px;
}

/* Title */
h2 {
    color: #2563eb;
    font-weight: 600;
}

/* Button */
button {
    background: #2563eb;
    color: white;
    border: none;
    padding: 12px 25px;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 15px;
    font-size: 16px;
    transition: 0.3s;
}

button:hover {
    background: #1e40af;
}
</style>

</head>

<body>

<h1 style="text-align:center; color:#1e3a8a;">
    👁️ AI-Based ROP Detection System
</h1>

<div class="container">

<h1>ROP Detection System</h1>

<p>Upload Retinal Fundus Image</p>

<form action="/predict" method="post" enctype="multipart/form-data">

<input type="file" name="image" required>

<br><br>

<button type="submit">Predict</button>

</form>

</div>

</body>
</html>
